<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - AI Plagiarism Detector</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .logo { text-align: center; font-size: 40px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .link a { color: #667eea; text-decoration: none; font-weight: bold; }
        .flash { padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .flash.error { background: #fde8e8; color: #e74c3c; }
        .flash.success { background: #eafaf1; color: #27ae60; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🔍</div>
    <h2>Create Account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required>
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required>
        <label>Role</label>
        <select name="role">
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
        </select>
        <button type="submit">Create Account</button>
    </form>
    <div class="link">Already have an account? <a href="/login">Login here</a></div>
</div>
</body>
</html>
